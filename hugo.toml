baseURL = 'https://chebf.github.io/icecream-blog/'
languageCode = 'zh-CN'
title = 'ICECREAM'
# 使用自定义主题（无外部主题依赖）

[params]
  author = 'chebf'
  description = 'ICECREAM - 技术、生活与思考'
  defaultTheme = 'auto'
  disableThemeToggle = false
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = true
  ShowRssButtonInSectionTermList = true
  UseHugoToc = true
  disableSpecial1stPost = false
  disableScrollToTop = false
  comments = false
  hidemeta = false
  hideSummary = false
  showtoc = true
  tocopen = false
  
  [params.homeInfoParams]
    Title = "ICECREAM"
    Content = "欢迎来到 ICECREAM，这里记录 chebf 的技术探索、生活感悟与思考碎片。"
  
  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/chebf"
  
  [[params.socialIcons]]
    name = "email"
    url = "mailto:chebf@example.com"
  
  [[params.socialIcons]]
    name = "rss"
    url = "index.xml"

[menu]
  [[menu.main]]
    identifier = 'home'
    name = '首页'
    url = '/'
    weight = 10
  
  [[menu.main]]
    identifier = 'posts'
    name = '文章'
    url = '/posts/'
    weight = 20
  
  [[menu.main]]
    identifier = 'tags'
    name = '标签'
    url = '/tags/'
    weight = 30
  
  [[menu.main]]
    identifier = 'categories'
    name = '分类'
    url = '/categories/'
    weight = 40
  
  [[menu.main]]
    identifier = 'about'
    name = '关于'
    url = '/about/'
    weight = 50

[taxonomies]
  tag = "tags"
  category = "categories"

[imaging]
  quality = 75
  resampleFilter = "lanczos"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    style = "github"
    lineNos = true
    codeFences = true
    guessSyntax = true
    lineNumbersInTable = true
    noClasses = false