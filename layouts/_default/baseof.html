<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ .Title }} | {{ .Site.Title }}</title>
    <!-- Generated by Hugo -->
    {{ range .AlternativeOutputFormats -}}
    <link rel="{{ .Rel }}" type="{{ .MediaType.Type }}" href="{{ .Permalink | safeURL }}">
    {{ end }}
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; line-height: 1.6; color: #333; }
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }
        header { padding: 20px 0; border-bottom: 1px solid #eee; margin-bottom: 40px; }
        header h1 { font-size: 1.5rem; }
        header a { text-decoration: none; color: #333; }
        nav a { margin-right: 15px; text-decoration: none; color: #666; }
        nav a:hover { color: #0066cc; }
        .post-list { list-style: none; }
        .post-list li { margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid #eee; }
        .post-list h2 { font-size: 1.3rem; margin-bottom: 8px; }
        .post-list a { text-decoration: none; color: #333; }
        .post-list a:hover { color: #0066cc; }
        .meta { color: #999; font-size: 0.9rem; }
        .content { line-height: 1.8; }
        .content h2 { margin: 30px 0 15px; }
        .content p { margin-bottom: 15px; }
        .content code { background: #f4f4f4; padding: 2px 6px; border-radius: 3px; }
        .content pre { background: #f4f4f4; padding: 15px; overflow-x: auto; border-radius: 5px; }
        footer { margin-top: 50px; padding: 30px 0; border-top: 1px solid #eee; text-align: center; color: #999; }
        .tags { margin-top: 10px; }
        .tags span { background: #f0f0f0; padding: 2px 8px; border-radius: 3px; font-size: 0.85rem; margin-right: 5px; }
        @media (prefers-color-scheme: dark) {
            body { background: #1a1a1a; color: #e0e0e0; }
            a { color: #58a6ff; }
            header, footer { border-color: #333; }
            .post-list li { border-color: #333; }
            .content code { background: #333; }
            .content pre { background: #333; }
            .tags span { background: #333; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1><a href="/">{{ .Site.Title }}</a></h1>
            <nav>
                <a href="/">首页</a>
                <a href="/posts/">文章</a>
                <a href="/tags/">标签</a>
                <a href="/categories/">分类</a>
                <a href="/about/">关于</a>
            </nav>
        </header>

        <main>
            {{ block "main" . }}{{ end }}
        </main>

        <footer>
            <p>&copy; {{ now.Year }} {{ .Site.Params.author | default "ICECREAM" }}. All rights reserved.</p>
        </footer>
    </div>
</body>
</html>
